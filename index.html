<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOH Assessment™ — Instituto Garcia Marques</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper: #F6F4EE;
  --paper-raised: #FFFFFF;
  --ink: #23302B;
  --ink-soft: #5B655F;
  --ink-faint: #97A099;
  --line: #DDD9CC;
  --teal: #33574B;
  --teal-deep: #203C33;
  --teal-tint: #E4EBE6;
  --gold: #B08A2E;
  --gold-tint: #F3EAD3;
  --rust: #A2472C;
  --rust-tint: #F3E2DC;
  --crit: #8E3B37;
  --crit-tint: #F3E1DE;
  --radius-s: 6px;
  --radius-m: 12px;
  --radius-l: 20px;
  --shadow: 0 1px 2px rgba(32,60,51,0.06), 0 8px 24px -12px rgba(32,60,51,0.18);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
#soh-root{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;color:var(--teal-deep);margin:0 0 .4em;letter-spacing:-0.01em;}
p{margin:0 0 1em;}
.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--teal);
  font-weight:600;
  margin-bottom:10px;
  display:block;
}
.small{font-size:13px;color:var(--ink-soft);}
.muted{color:var(--ink-soft);}

/* ---- header / brand ---- */
.soh-brand{
  display:flex;align-items:baseline;justify-content:space-between;
  padding-bottom:18px;margin-bottom:28px;border-bottom:1px solid var(--line);
}
.soh-brand .mark{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--teal-deep);}
.soh-brand .mark span{color:var(--rust);}
.soh-brand .tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
.who-bar{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--ink-soft);}
.who-bar .muted{font-size:11.5px;}
.assessment-row td{font-size:13.5px;}
#assessments-search{font-size:14px;}
@media (max-width:900px){
  .index-grid[style*="repeat(6"]{grid-template-columns:repeat(3,1fr) !important;}
  .index-grid[style*="repeat(4"]{grid-template-columns:repeat(2,1fr) !important;}
}

/* ---- cards ---- */
.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius-l);
  padding:32px;
  box-shadow:var(--shadow);
  margin-bottom:22px;
  break-inside:avoid;
  page-break-inside:avoid;
}
.card-tight{padding:22px 24px;}

/* ---- buttons ---- */
.btn{
  font-family:var(--font-body);
  font-weight:600;
  font-size:14px;
  border-radius:999px;
  padding:13px 26px;
  border:1px solid transparent;
  cursor:pointer;
  transition:transform .12s ease, background .15s ease, box-shadow .15s ease;
  display:inline-flex;align-items:center;gap:8px;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--teal-deep);color:#fff;}
.btn-primary:hover{background:var(--teal);}
.btn-primary:disabled{background:var(--ink-faint);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--teal-deep);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--teal-deep);}
.btn-text{background:none;border:none;color:var(--ink-soft);text-decoration:underline;padding:8px 4px;}
.btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px;}

/* ---- form fields ---- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.01em;}
.field input, .field select, .field textarea{
  width:100%;
  font-family:var(--font-body);
  font-size:15px;
  padding:11px 13px;
  border:1px solid var(--line);
  border-radius:var(--radius-s);
  background:#FCFBF8;
  color:var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 18px;}
@media (max-width:640px){
  .grid2,.grid3{grid-template-columns:1fr;}
  .soh-brand{flex-direction:column;align-items:flex-start;gap:4px;}
  .progress-meta{flex-direction:column;gap:2px;}
  .index-grid{grid-template-columns:1fr 1fr;}
  #soh-root{padding:18px 14px 60px;}
}

/* ---- progress ---- */
.progress-wrap{position:sticky;top:0;background:var(--paper);padding:12px 0 16px;z-index:10;}
.progress-meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;letter-spacing:.03em;}
.progress-track{height:6px;background:var(--line);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .3s ease;}
.domain-dots{display:flex;gap:5px;margin-top:10px;}
.dot{flex:1;height:4px;border-radius:2px;background:var(--line);}
.dot.done{background:var(--teal);}
.dot.current{background:var(--gold);}

/* ---- assessment ---- */
.domain-head{margin-bottom:22px;}
.domain-head .num{font-family:var(--font-mono);color:var(--rust);font-size:13px;font-weight:600;}
.subdomain-block{margin-bottom:28px;}
.subdomain-title{
  font-family:var(--font-mono);
  font-size:11.5px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--teal);
  font-weight:600;
  margin-bottom:12px;
  padding-bottom:6px;
  border-bottom:1px dashed var(--line);
}
.question-row{
  display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
  padding:16px 0;border-bottom:1px solid var(--line);
}
.question-row:last-child{border-bottom:none;}
.question-text{font-size:15px;color:var(--ink);flex:1;padding-top:6px;}
.question-text .qn{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-right:8px;}
.question-row.unanswered{background:linear-gradient(to right, var(--rust-tint), transparent 40%);border-radius:8px;}

.likert{display:flex;gap:8px;flex-shrink:0;}
.likert label{
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:58px;
}
.likert input{position:absolute;opacity:0;width:1px;height:1px;}
.likert .bubble{
  width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);
  transition:all .12s ease;background:#fff;
}
.likert input:checked + .bubble{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff;}
.likert .lbl{font-size:9.5px;color:var(--ink-faint);text-align:center;line-height:1.2;}
.likert label:hover .bubble{border-color:var(--teal);}

.likert-legend{
  display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px;
  font-family:var(--font-mono);font-size:9.5px;color:var(--ink-faint);
}
.likert-legend span{
  width:58px;text-align:center;line-height:1.3;
  word-break:break-word;overflow-wrap:break-word;hyphens:auto;
}

.likert-legend-mobile{
  display:none;
}

@media (max-width:640px){
  .question-row{flex-direction:column;gap:10px;padding:18px 0;}
  .question-text{padding-top:0;font-size:14.5px;}
  .likert{align-self:center;gap:10px;}
  .likert label{width:auto;}
  .likert .bubble{width:38px;height:38px;font-size:14px;}
  .likert-legend{display:none;}
  .likert-legend-mobile{
    display:block;
    font-size:12px;line-height:1.7;color:var(--ink-soft);
    background:var(--teal-tint);border-radius:var(--radius-m);
    padding:10px 14px;margin-bottom:18px;
  }
  .likert-legend-mobile strong{color:var(--teal-deep);font-family:var(--font-mono);}
  .card{padding:20px 16px;}
  .index-card .v{font-size:22px;}
  .report-hero{gap:18px;}
  .igsoh-badge{width:120px;height:120px;}
  .igsoh-badge .val{font-size:34px;}
}

/* ---- report ---- */
.report-hero{
  display:flex;align-items:center;gap:32px;flex-wrap:wrap;
}
.igsoh-badge{
  width:150px;height:150px;border-radius:50%;
  background:var(--teal-deep);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.igsoh-badge .val{font-family:var(--font-display);font-size:44px;font-weight:700;line-height:1;}
.igsoh-badge .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;margin-top:6px;opacity:.85;}
.badge-class{
  display:inline-block;padding:5px 12px;border-radius:999px;
  font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.03em;margin-top:8px;
}
.class-critico{background:var(--crit-tint);color:var(--crit);}
.class-inicial{background:var(--rust-tint);color:var(--rust);}
.class-moderado{background:var(--gold-tint);color:var(--gold);}
.class-consistente{background:var(--teal-tint);color:var(--teal);}
.class-excelencia{background:var(--teal-deep);color:#fff;}

.index-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px;}
@media (max-width:720px){.index-grid{grid-template-columns:repeat(2,1fr);}}
.index-card{background:var(--teal-tint);border-radius:var(--radius-m);padding:16px;}
.index-card .k{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--teal-deep);letter-spacing:.05em;}
.index-card .v{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--teal-deep);margin:4px 0 2px;}
.index-card .d{font-size:11.5px;color:var(--ink-soft);}

table.domain-table{width:100%;border-collapse:collapse;margin-top:10px;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-scroll table.domain-table{min-width:560px;}
@media (min-width:640px){.table-scroll table.domain-table{min-width:0;}}
table.domain-table th{
  text-align:left;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink-faint);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);
}
table.domain-table td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle;}
table.domain-table tr:last-child td{border-bottom:none;}
.score-bar-wrap{display:flex;align-items:center;gap:10px;}
.score-bar-track{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;min-width:80px;}
.score-bar-fill{height:100%;border-radius:4px;}
.score-num{font-family:var(--font-mono);font-weight:600;width:38px;text-align:right;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:720px){.two-col{grid-template-columns:1fr;}}
.list-plain{list-style:none;padding:0;margin:0;}
.list-plain li{padding:10px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;}
.list-plain li:last-child{border-bottom:none;}

.cpt-banner{
  background:var(--rust-tint);border:1px solid var(--rust);border-radius:var(--radius-m);
  padding:18px 20px;margin:20px 0;
}
.cpt-banner .eyebrow{color:var(--rust);}

.pedi-table input, .pedi-table select{
  width:100%;border:1px solid transparent;background:transparent;font-family:var(--font-body);font-size:13.5px;padding:6px;border-radius:6px;
}
.pedi-table input:hover, .pedi-table select:hover, .pedi-table input:focus, .pedi-table select:focus{border-color:var(--line);background:#fff;}

.domain-report-card h4{font-family:var(--font-body);font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--rust);font-weight:700;margin:26px 0 8px;}
.domain-report-card h4:first-of-type{margin-top:20px;}
.domain-report-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:6px;}
.domain-report-head h2{margin:0;}
.compact-list{display:block;}
.compact-list li{display:list-item;list-style:disc;margin-left:20px;padding:4px 0;border-bottom:none;font-size:14px;}
.component-list{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.component-row{border:1px solid var(--line);border-radius:var(--radius-s);padding:10px 14px;background:#FCFBF8;}
.component-name{font-weight:600;font-size:13.5px;color:var(--teal-deep);}
.component-score{margin:4px 0;}
.component-note{margin:0;}
.domain-closing{margin-top:22px;padding-top:14px;border-top:1px dashed var(--line);font-style:italic;color:var(--teal-deep);}
.priority-deepdive-card{border-color:var(--gold);}
.priority-deepdive-card .eyebrow{color:var(--gold);}
.profile-card{border-color:var(--teal-deep);}
.profile-card .eyebrow{color:var(--teal-deep);}
.cronograma-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:14px;}
@media (max-width:720px){.cronograma-grid{grid-template-columns:1fr;}}
.cronograma-stage{background:var(--teal-tint);border-radius:var(--radius-m);padding:16px;}
.cronograma-stage h4{margin:0 0 6px;font-size:13px;color:var(--teal-deep);}

.print-only{display:none;}

@media print{
  body{background:#fff;}
  .no-print{display:none !important;}
  .print-only{display:block;}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
  #soh-root{max-width:100%;padding:0;}
}

.footer-disclaimer{
  font-size:11.5px;color:var(--ink-faint);border-top:1px solid var(--line);padding-top:16px;margin-top:30px;line-height:1.6;
}

.radio-option-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.radio-option, .checkbox-option{
  display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  border:1px solid var(--line);border-radius:var(--radius-m);cursor:pointer;
  font-size:14px;color:var(--ink);transition:border-color .15s ease,background .15s ease;
}
.radio-option:hover, .checkbox-option:hover{border-color:var(--teal);background:var(--teal-tint);}
.radio-option input, .checkbox-option input{margin-top:3px;flex-shrink:0;width:16px;height:16px;accent-color:var(--teal-deep);}
.checkbox-option{margin-bottom:12px;}

svg.radar text{font-family:var(--font-mono);}

</style>
</head>

/* ============================================================
   config.js
   Configuração de conexão com o Supabase.
   ------------------------------------------------------------
   IMPORTANTE:
   - Preencha SUPABASE_URL com a "Project URL" do seu projeto
     (Supabase Dashboard → Settings → API → Project URL).
   - A anonKey abaixo é a chave PUBLISHABLE (pública), segura para
     uso no navegador. NUNCA coloque a chave "secret"/service_role
     neste arquivo ou em qualquer código que rode no navegador —
     ela ignora as políticas de segurança (RLS) e dá acesso total
     ao banco de dados.
   ============================================================ */

const SUPABASE_CONFIG = {
  url: "https://qhcpiftnagmpkpermzfe.supabase.co",

  // Chave publishable/anon (pública) — segura para uso no navegador
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoY3BpZnRuYWdtcGtwZXJtemZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTgwNzMsImV4cCI6MjA5OTIzNDA3M30.h_wCFUnVijh7des3LgwOdShdaTzdN-staNy3gooD6MY"
};

/* ============================================================
   supabase.js
   Inicialização do cliente Supabase (supabase-js v2).
   O SDK é carregado via CDN como script clássico (window.supabase),
   compatível com a estrutura de página única do SOH Assessment™.
   ============================================================ */

let sbClient = null;
let sbReady = false;

function initSupabase() {
  if (sbClient) return sbClient;
  if (typeof window.supabase === "undefined" || !window.supabase.createClient) {
    console.error("[SOH] SDK do Supabase não carregado. Verifique a tag <script> do CDN no <head>.");
    return null;
  }
  if (!SUPABASE_CONFIG.url || SUPABASE_CONFIG.url.includes("SEU-PROJETO")) {
    console.warn("[SOH] SUPABASE_CONFIG.url não configurada. Os dados NÃO serão salvos até que você preencha config.js com a Project URL do seu projeto Supabase.");
    return null;
  }
  sbClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey, {
    auth: { persistSession: true, autoRefreshToken: true }
  });
  sbReady = true;
  return sbClient;
}

/* ============================================================
   auth.js
   Autenticação de facilitadores/administrador via Supabase Auth.
   ============================================================ */

async function authSignIn(email, password) {
  const sb = initSupabase();
  if (!sb) throw new Error("Cliente Supabase não inicializado.");
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function authSignOut() {
  const sb = initSupabase();
  if (!sb) return;
  await sb.auth.signOut();
}

async function authGetSession() {
  const sb = initSupabase();
  if (!sb) return null;
  const { data, error } = await sb.auth.getSession();
  if (error) { console.error("[SOH] Erro ao obter sessão:", error); return null; }
  return data.session;
}

async function authGetProfile(userId) {
  const sb = initSupabase();
  if (!sb) return null;
  const { data, error } = await sb.from("profiles").select("*").eq("id", userId).single();
  if (error) { console.error("[SOH] Erro ao carregar perfil:", error); return null; }
  return data;

// Identificação do Perfil Diagnóstico predominante a partir do IGSOH™ e dos quatro Índices
// Estratégicos. O Capítulo 20 do Manual Técnico descreve os perfis qualitativamente, sem
// fórmula numérica exata — os limiares abaixo operacionalizam essas descrições de forma
// consistente com as faixas oficiais de classificação (1,00–5,00).
function computeProfiles(r){
  const { IGSOH, ICS, ITP, IRE, IEI } = r;
  const scores = {
    "Construtor em Formação": (ITP >= 3.0 ? 0.5 : 0) + (IRE < 3.4 ? 0.3 : 0) + (IGSOH < 3.4 ? 0.2 : 0),
    "Executor Estratégico": (IRE >= 3.4 ? 0.5 : 0) + (IEI < 3.8 ? 0.3 : 0) + (IGSOH >= 3.0 ? 0.2 : 0),
    "Potencial Oculto": (ITP >= 3.4 ? 0.4 : 0) + (IRE < 3.4 ? 0.4 : 0) + (IGSOH >= 2.6 ? 0.2 : 0),
    "Reconstrutor": (IGSOH < 2.6 ? 0.5 : 0) + (ITP < 3.4 ? 0.3 : 0) + (ICS < 3.4 ? 0.2 : 0),
    "Líder Integrador": (IGSOH >= 3.4 && IGSOH < 4.2 ? 0.5 : 0) + (ICS >= 3.4 ? 0.25 : 0) + (IEI >= 3.4 ? 0.25 : 0),
    "Excelência Integral": (IGSOH >= 4.2 ? 0.4 : 0) + (ICS >= 4.2 ? 0.3 : 0) + (IEI >= 4.2 ? 0.3 : 0)
  };
  const ranked = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const predominant = ranked[0][0];
  const secondary = ranked[1][1] > 0 ? ranked[1][0] : null;
  const potential = PROFILE_NEXT_STAGE[predominant];
  return { predominant, secondary, potential: potential !== predominant ? potential : null, scores };
}

const CLASSIFICATION_BANDS = [
  { min: 1.00, max: 1.79, label: "Desenvolvimento Crítico", css: "class-critico", color: "#8E3B37" },
  { min: 1.80, max: 2.59, label: "Desenvolvimento Inicial", css: "class-inicial", color: "#A2472C" },
  { min: 2.60, max: 3.39, label: "Desenvolvimento Moderado", css: "class-moderado", color: "#B08A2E" },
  { min: 3.40, max: 4.19, label: "Desenvolvimento Consistente", css: "class-consistente", color: "#33574B" },
  { min: 4.20, max: 5.001, label: "Desenvolvimento de Excelência", css: "class-excelencia", color: "#203C33" }
];

const LIKERT_LABELS = ["Nunca ou\nquase nunca", "Raramente", "Às vezes", "Frequentemente", "Sempre ou\nquase sempre"];

function classify(score) {
  for (const b of CLASSIFICATION_BANDS) {
    if (score >= b.min && score <= b.max) return b;
  }
  return CLASSIFICATION_BANDS[0];
}

function round2(n) { return Math.round(n * 100) / 100; }

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }

function popStdev(arr) {
  const m = mean(arr);
  const variance = mean(arr.map(x => (x - m) * (x - m)));
  return Math.sqrt(variance);
}

/* ===================== MOTOR DE CÁLCULO ===================== */
// answers: { [questionNumber]: 1-5 }
function computeResults(answers) {
  const domainScores = {};
  const domainDetail = {};

  DOMAIN_ORDER.forEach(domName => {
    const domInfo = DOMAIN_MAP[domName];
    const subScores = [];
    const subDetail = [];
    domInfo.subs.forEach(sub => {
      const vals = sub.items.map(n => answers[n]);
      const avg = mean(vals);
      subScores.push(avg);
      subDetail.push({ name: sub.name, score: round2(avg), items: sub.items.map(n => ({ n, v: answers[n] })) });
    });
    const domAvg = mean(subScores);
    domainScores[domName] = domAvg;
    domainDetail[domName] = { score: round2(domAvg), subdomains: subDetail };
  });

  const domainScoreList = DOMAIN_ORDER.map(d => domainScores[d]);
  const IGSOH = mean(domainScoreList);

  const macroScores = {};
  MACRODIMENSIONS.forEach(m => {
    macroScores[m.name] = mean(m.domains.map(d => domainScores[d]));
  });
  const macroScoreList = MACRODIMENSIONS.map(m => macroScores[m.name]);

  const ICS = Math.min(5, Math.max(1, 5 - popStdev(domainScoreList)));
  const ITP = mean(ITP_DOMAINS.map(d => domainScores[d]));
  const IRE = mean(IRE_DOMAINS.map(d => domainScores[d]));
  const IEI = Math.min(5, Math.max(1, 5 - popStdev(macroScoreList)));

  // ranking for CPT / pontos fortes-vulneráveis
  const ranked = DOMAIN_ORDER.map(d => ({ domain: d, score: domainScores[d] })).sort((a, b) => a.score - b.score);
  const cpt = ranked[0];
  const nextPriority = ranked.slice(1, 3); // nível 2
  const strongest = ranked[ranked.length - 1];

  const pontosFortes = ranked.filter(r => classify(r.score).label.match(/Consistente|Excelência/)).slice(-3).reverse();
  const pontosVulneraveis = ranked.filter(r => classify(r.score).label.match(/Crítico|Inicial/)).slice(0, 3);

  const pedi = ranked.map((r, i) => ({
    priority: i + 1,
    domain: r.domain,
    score: round2(r.score),
    classification: classify(r.score).label,
    protocol: PROTOCOLS[r.domain],
    prazo: i < 3 ? "30 dias" : (i < 6 ? "90 dias" : "180 dias")
  }));

  return {
    domainScores, domainDetail,
    domainScoreList,
    IGSOH: round2(IGSOH),
    macroScores, macroScoreList,
    ICS: round2(ICS), ITP: round2(ITP), IRE: round2(IRE), IEI: round2(IEI),
    ranked, cpt, nextPriority, strongest,
    pontosFortes, pontosVulneraveis,
    pedi
  };
}

   Arquitetura (v3):

     subdomain_scores       → pontuação dos 72 subdomínios
     results                → radar, macrodimensões, interpretações
     recommendations         → plano de ação (PEDI™), 1 linha por domínio
   ============================================================ */

async function dbInsertParticipant(patient, facilitadorId) {
  const sb = initSupabase();
  if (!sb) throw new Error("Cliente Supabase não inicializado.");

  const id = crypto.randomUUID();

  const { error } = await sb
    .from("participants")
    .insert({
      id,
      facilitador_id: facilitadorId,
      assessment_date: patient.data || null,
      assessment_time: new Date().toTimeString().slice(0, 8),
      nome: patient.nome,
      email: patient.email || null,
      telefone: patient.telefone || null,
      empresa: patient.empresa || null,
      cargo: patient.profissao || null,
      cidade: patient.cidade || null,
      estado: patient.estado || null,
      sexo: patient.sexo || null,
      idade: patient.idade ? parseInt(patient.idade, 10) : null,
      estado_civil: patient.estadoCivil || null,
      escolaridade: patient.escolaridade || null,
      facilitador: patient.facilitador || null,
      programa: patient.programa || null,
      observacoes: patient.observacoes || null
    });

  if (error) throw error;
  return { id };
}

async function dbInsertAssessment({ participantId, startedAt, durationSeconds, results, facilitadorId }) {
  const sb = initSupabase();
  if (!sb) throw new Error("Cliente Supabase não inicializado.");

  const id = crypto.randomUUID();
  const igsohClass = classify(results.IGSOH).label;

  const { error } = await sb
    .from("assessments")
    .insert({
      id,
      participant_id: participantId,
      facilitador_id: facilitadorId,
      instrument_version: INSTRUMENT_VERSION,
      started_at: new Date(startedAt).toISOString(),
      duration_seconds: Number.isFinite(durationSeconds) ? durationSeconds : null,
      igsoh: results.IGSOH,
      igsoh_classification: igsohClass,
      ics: results.ICS,
      itp: results.ITP,
      ire: results.IRE,
      iei: results.IEI,
      cpt_domain: results.cpt.domain,
      cpt_score: round2(results.cpt.score),
      status: "completed"
    });

  if (error) throw error;
  return { id };
}

async function dbInsertAnswers(assessmentId, answers) {
  const sb = initSupabase();
  const rows = QUESTIONS.map(q => ({
    assessment_id: assessmentId,
    question_id: q.n,
    instrument_version: INSTRUMENT_VERSION,
    answer_value: answers[q.n]
  }));
  // Insere em lotes de 100 para evitar payloads muito grandes
  for (let i = 0; i < rows.length; i += 100) {
    const batch = rows.slice(i, i + 100);
    const { error } = await sb.from("answers").insert(batch);
    if (error) throw error;
  }
}

async function dbInsertDomainScores(assessmentId, domainDetail) {
  const sb = initSupabase();
  const rows = DOMAIN_ORDER.map((domainName, i) => ({
    assessment_id: assessmentId,
    domain_name: domainName,
    domain_order: i + 1,
    score: domainDetail[domainName].score,
    classification: classify(domainDetail[domainName].score).label
  }));
  const { error } = await sb.from("domain_scores").insert(rows);
  if (error) throw error;
}

async function dbInsertSubdomainScores(assessmentId, domainDetail) {
  const sb = initSupabase();
  const rows = [];
  DOMAIN_ORDER.forEach(domainName => {
    domainDetail[domainName].subdomains.forEach((sub, i) => {
      rows.push({
        assessment_id: assessmentId,
        domain_name: domainName,
        subdomain_name: sub.name,
        subdomain_order: i + 1,
        score: sub.score
      });
    });
  });
  const { error } = await sb.from("subdomain_scores").insert(rows);
  if (error) throw error;
}

async function dbInsertResults(assessmentId, results) {
  const sb = initSupabase();

  const interpretations = {
    IGSOH: "Índice Geral do Sistema Operacional Humano™ — média dos 12 domínios. Representa o nível global de desenvolvimento.",
    ICS: "Consistência do Sistema — mede o equilíbrio entre os domínios (quanto mais próximo de 5, mais uniforme o desenvolvimento).",

    macrodimensions: MACRODIMENSIONS.map(m => ({ name: m.name, score: round2(results.macroScores[m.name]) })),
    interpretations,
    pontos_fortes: results.pontosFortes.map(p => ({ domain: p.domain, score: round2(p.score) })),
    pontos_vulneraveis: results.pontosVulneraveis.map(p => ({ domain: p.domain, score: round2(p.score) }))

async function dbInsertRecommendations(assessmentId, results) {

/* ------------------------------------------------------------
   Consultas de leitura — Portal do Facilitador e Portal Admin
   O RLS filtra automaticamente: facilitador só recebe o que é
   seu; administrador (is_admin()) recebe tudo, sem precisar de
   nenhum filtro extra no código.
   ------------------------------------------------------------ */

async function dbListAssessments({ search = "", limit = 100 } = {}) {
  const sb = initSupabase();
  let query = sb
    .from("assessments")
    .select("id, completed_at, duration_seconds, igsoh, igsoh_classification, ics, itp, ire, iei, cpt_domain, facilitador_id, participants(nome, email, cidade, estado, empresa, programa)")
    .order("completed_at", { ascending: false })
    .limit(limit);

  const { data, error } = await query;
  if (error) throw error;

  if (!search) return data;
  const term = search.toLowerCase();
  return data.filter(a =>
    (a.participants?.nome || "").toLowerCase().includes(term) ||
    (a.participants?.cidade || "").toLowerCase().includes(term) ||
    (a.participants?.estado || "").toLowerCase().includes(term) ||
    (a.participants?.programa || "").toLowerCase().includes(term)
  );
}

async function dbGetAssessmentFull(assessmentId) {
  const sb = initSupabase();
  const [assessmentRes, domainsRes, subdomainsRes, resultsRes, recsRes, feedbackRes] = await Promise.all([
    sb.from("assessments").select("*, participants(*)").eq("id", assessmentId).single(),
    sb.from("domain_scores").select("*").eq("assessment_id", assessmentId).order("domain_order"),
    sb.from("subdomain_scores").select("*").eq("assessment_id", assessmentId).order("subdomain_order"),
    sb.from("results").select("*").eq("assessment_id", assessmentId).single(),
    sb.from("recommendations").select("*").eq("assessment_id", assessmentId).order("prioridade"),
    sb.from("post_assessment_feedback").select("*").eq("assessment_id", assessmentId).maybeSingle()
  ]);
  if (assessmentRes.error) throw assessmentRes.error;
  if (domainsRes.error) throw domainsRes.error;
  if (subdomainsRes.error) throw subdomainsRes.error;
  if (resultsRes.error) throw resultsRes.error;
  if (recsRes.error) throw recsRes.error;
  // feedbackRes.error é ignorado de propósito: nem toda avaliação tem
  // feedback (o participante pode não ter concluído essa etapa ainda).

  return {
    assessment: assessmentRes.data,
    participant: assessmentRes.data.participants,
    domainScores: domainsRes.data,
    subdomainScores: subdomainsRes.data,
    results: resultsRes.data,
    recommendations: recsRes.data,
    feedback: feedbackRes.data || null
  };
}

async function dbGetDomainAverages() {
  const sb = initSupabase();
  const { data, error } = await sb.from("domain_scores").select("domain_name, score");
  if (error) throw error;
  const grouped = {};
  data.forEach(row => {
    if (!grouped[row.domain_name]) grouped[row.domain_name] = { sum: 0, count: 0 };
    grouped[row.domain_name].sum += Number(row.score);
    grouped[row.domain_name].count += 1;
  });
  return DOMAIN_ORDER.map(d => grouped[d] ? round2(grouped[d].sum / grouped[d].count) : 1);
}

/* ============================================================
   assessment.js
   Orquestra a gravação automática do assessment completo no
   Supabase, no momento em que o participante conclui a
   avaliação. Não interfere na renderização da interface —
   a gravação ocorre em segundo plano (fire-and-forget).
   ============================================================ */

function logSupabaseError(step, err) {
  // Erros do PostgREST/Postgres trazem detalhes muito mais úteis do
  // que err.message sozinho (code, details, hint) — sempre logamos tudo.
  console.error(`[SOH] Falha ao salvar (${step}):`, {
    message: err && err.message,
    details: err && err.details,
    hint: err && err.hint,
    code: err && err.code,
    raw: err
  });
  window.SOH_lastError = { step, err };
}

async function persistAssessment(state, results) {
  let step = "init";
  try {
    step = "cliente Supabase";
    const sb = initSupabase();
    if (!sb) throw new Error("Cliente Supabase não inicializado (verifique config.js e se o SDK carregou).");

    if (state.linkToken) {
      step = "envio via link (submit_assessment_via_link)";
      const payload = buildLinkSubmissionPayload(state, results);
      const data = await dbSubmitViaLink(payload);
      state.savedAssessmentId = data.assessment_id;
      state.savedParticipantId = data.participant_id;
      console.info("[SOH] Avaliação (via link) salva com sucesso. assessment_id:", data.assessment_id);
      return;
    }

    if (!state.profile || !state.profile.id) throw new Error("Nenhum facilitador autenticado — a avaliação não pôde ser vinculada a um usuário.");

    step = "participants";
    const participant = await dbInsertParticipant(state.patient, state.profile.id);

    const durationSeconds = state.startedAt
      ? Math.round((Date.now() - state.startedAt) / 1000)
      : null;

    step = "assessments";
    const assessment = await dbInsertAssessment({
      participantId: participant.id,
      startedAt: state.startedAt || Date.now(),
      durationSeconds,
      results,
      facilitadorId: state.profile.id
    });

    step = "answers/domain_scores/subdomain_scores/results/recommendations";
    await Promise.all([
      dbInsertAnswers(assessment.id, state.answers),
      dbInsertDomainScores(assessment.id, results.domainDetail),
      dbInsertSubdomainScores(assessment.id, results.domainDetail),
      dbInsertResults(assessment.id, results),
      dbInsertRecommendations(assessment.id, results)
    ]);

    state.savedAssessmentId = assessment.id;
    state.savedParticipantId = participant.id;
    console.info("[SOH] Avaliação salva com sucesso no Supabase. assessment_id:", assessment.id, "participant_id:", participant.id);
  } catch (err) {
    // Falha na gravação não deve interromper a experiência do participante/facilitador.
    // O relatório continua sendo exibido normalmente a partir dos dados locais.
    logSupabaseError(step, err);
  }
}

function buildLinkSubmissionPayload(state, results) {
  const p = state.patient;
  const durationSeconds = state.startedAt ? Math.round((Date.now() - state.startedAt) / 1000) : null;

  const domain_scores = DOMAIN_ORDER.map((domainName, i) => ({
    domain_name: domainName,
    domain_order: i + 1,
    score: results.domainDetail[domainName].score,
    classification: classify(results.domainDetail[domainName].score).label
  }));

  const subdomain_scores = [];
  DOMAIN_ORDER.forEach(domainName => {
    results.domainDetail[domainName].subdomains.forEach((sub, i) => {
      subdomain_scores.push({
        domain_name: domainName,
        subdomain_name: sub.name,
        subdomain_order: i + 1,
        score: sub.score
      });
    });
  });

  const answers = QUESTIONS.map(q => ({ question_id: q.n, answer_value: state.answers[q.n] }));

  const interpretations = {
    IGSOH: "Índice Geral do Sistema Operacional Humano™ — média dos 12 domínios. Representa o nível global de desenvolvimento.",
    ICS: "Consistência do Sistema — mede o equilíbrio entre os domínios (quanto mais próximo de 5, mais uniforme o desenvolvimento).",
    ITP: "Transformação Potencial — capacidade de mudança nos domínios de base cognitiva e autorregulatória.",
    IRE: "Realização Estratégica — capacidade de converter potencial em resultado prático.",
    IEI: "Equilíbrio Integral — equilíbrio entre as 4 macrodimensões do sistema."
  };

  const recommendations = results.pedi.map(item => ({
    prioridade: item.priority,
    domain_name: item.domain,
    score: item.score,
    classification: item.classification,
    protocolo: item.protocol,
    nivel: item.priority === 1 ? "1 - Obrigatório" : (item.priority <= 3 ? "2 - Complementar" : "3 - Manutenção"),
    prazo: item.prazo
  }));

  return {
    token: state.linkToken,
    participant: {
      nome: p.nome,
      email: p.email || null,
      telefone: p.telefone || null,
      empresa: p.empresa || null,
      cargo: p.profissao || null,
      cidade: p.cidade || null,
      estado: p.estado || null,
      sexo: p.sexo || null,
      idade: p.idade || null,
      estado_civil: p.estadoCivil || null,
      escolaridade: p.escolaridade || null,
      facilitador: p.facilitador || null,
      programa: p.programa || null,
      observacoes: p.observacoes || null,
      assessment_date: p.data || null,
      assessment_time: new Date().toTimeString().slice(0, 8)
    },
    assessment: {
      instrument_version: INSTRUMENT_VERSION,
      started_at: new Date(state.startedAt || Date.now()).toISOString(),
      duration_seconds: durationSeconds,
      igsoh: results.IGSOH,
      igsoh_classification: classify(results.IGSOH).label,
      ics: results.ICS, itp: results.ITP, ire: results.IRE, iei: results.IEI,
      cpt_domain: results.cpt.domain, cpt_score: round2(results.cpt.score)
    },
    answers,
    domain_scores,
    subdomain_scores,
    results: {
      radar_data: DOMAIN_ORDER.map((d, i) => ({ domain: d, score: round2(results.domainScoreList[i]) })),
      macrodimensions: MACRODIMENSIONS.map(m => ({ name: m.name, score: round2(results.macroScores[m.name]) })),
      interpretations,
      pontos_fortes: results.pontosFortes.map(x => ({ domain: x.domain, score: round2(x.score) })),
      pontos_vulneraveis: results.pontosVulneraveis.map(x => ({ domain: x.domain, score: round2(x.score) }))
    },
    recommendations
  };
}

/* ------------------------------------------------------------
   Diagnóstico manual — rode SOH_testConnection() no console do
   navegador (F12) para confirmar rapidamente se a conexão com o
   Supabase está funcionando, sem precisar preencher todo o
   assessment.
   ------------------------------------------------------------ */
async function SOH_testConnection() {
  console.info("[SOH] Testando conexão com Supabase...");
  const sb = initSupabase();
  if (!sb) {
    console.error("[SOH] FALHOU: cliente não inicializado. Verifique se a tag <script> do CDN carregou (veja a aba Network) e se config.js tem a URL/chave corretas.");
    return false;
  }
  try {
    const { data, error } = await sb.from("questions").select("id").limit(1);
    if (error) {
      console.error("[SOH] FALHOU ao ler a tabela 'questions':", error);
      return false;
    }
    console.info("[SOH] Leitura OK. Exemplo:", data);

    const testId = crypto.randomUUID();
    const { error: insErr } = await sb.from("participants").insert({
      id: testId,
      nome: "__SOH_TESTE_CONEXAO__"
    });
    if (insErr) {
      console.error("[SOH] FALHOU ao inserir em 'participants' (provável causa: RLS/policy):", insErr);
      return false;
    }
    console.info("[SOH] Inserção de teste em 'participants' OK. id:", testId);
    console.info("[SOH] Tudo funcionando. Esse registro de teste pode ser apagado no Table Editor do Supabase.");
    return true;
  } catch (e) {
    console.error("[SOH] Erro inesperado no teste:", e);
    return false;
  }
}

/* ===================== DOMAIN (assessment) ===================== */
function renderDomain(){
  const domName = DOMAIN_ORDER[state.domainIndex];
  const domInfo = DOMAIN_MAP[domName];
  const domQuestions = QUESTIONS.filter(q => q.domain === domName);
  const answeredInDomain = domQuestions.filter(q => state.answers[q.n] !== undefined).length;
  const overallPct = Math.round((totalAnswered() / 288) * 100);

  const dots = DOMAIN_ORDER.map((d, i) => {
    let cls = "dot";
    if (i < state.domainIndex) cls += " done";
    else if (i === state.domainIndex) cls += " current";
    return `<div class="${cls}" title="${esc(d)}"></div>`;
  }).join("");

  let subHtml = "";
  domInfo.subs.forEach(sub => {
    const rows = sub.items.map(n => {
      const q = QUESTIONS.find(x => x.n === n);
      const val = state.answers[n];
      const unanswered = val === undefined;
      const bubbles = [1,2,3,4,5].map(v => `
        <label>
          <input type="radio" name="q_${n}" value="${v}" ${val===v?'checked':''} data-qn="${n}">
          <span class="bubble">${v}</span>
        </label>`).join("");
      return `<div class="question-row ${unanswered?'':''}" data-row="${n}">
        <div class="question-text"><span class="qn">${String(n).padStart(3,'0')}</span>${esc(q.q)}</div>
        <div class="likert">${bubbles}</div>
      </div>`;
    }).join("");
    subHtml += `<div class="subdomain-block">
      <div class="subdomain-title">${esc(sub.name)}</div>
      ${rows}
    </div>`;
  });

  root.innerHTML = `
    ${brandHeader()}
    <div class="progress-wrap no-print">
      <div class="progress-meta">
        <span>Domínio ${state.domainIndex+1} de 12 &middot; ${esc(domName)}</span>
        <span>${totalAnswered()} / 288 respondidas (${overallPct}%)</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${overallPct}%"></div></div>
      <div class="domain-dots">${dots}</div>
    </div>
    <div class="card">
      <div class="domain-head">
        <span class="num">DOMÍNIO ${toRoman(state.domainIndex+1)}</span>
        <h2>${esc(domName)}</h2>
        <p class="muted small">${answeredInDomain} de 24 questões respondidas neste domínio.</p>
      </div>
      <div class="likert-legend">
        ${LIKERT_LABELS.map(l => `<span>${l.split("\n")[0]}${l.includes("\n")?"<br>"+l.split("\n")[1]:""}</span>`).join("")}
      </div>
      <div class="likert-legend-mobile">
        <strong>1</strong> Nunca/quase nunca &nbsp;·&nbsp;
        <strong>2</strong> Raramente &nbsp;·&nbsp;
        <strong>3</strong> Às vezes &nbsp;·&nbsp;
        <strong>4</strong> Frequentemente &nbsp;·&nbsp;
        <strong>5</strong> Sempre/quase sempre
      </div>
      ${subHtml}
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-prev">${state.domainIndex===0 ? "← Editar cadastro" : "← Domínio anterior"}</button>
        <button class="btn btn-primary" id="btn-next" ${answeredInDomain<24 ? 'disabled' : ''}>
          ${state.domainIndex===11 ? "Concluir e gerar relatório →" : "Próximo domínio →"}
        </button>
      </div>
    </div>
  `;

  root.querySelectorAll('.likert input[type=radio]').forEach(inp => {
    inp.addEventListener('change', (e) => {
      const n = parseInt(e.target.dataset.qn, 10);
      state.answers[n] = parseInt(e.target.value, 10);
      const row = root.querySelector(`.question-row[data-row="${n}"]`);
      if (row) row.classList.remove('unanswered');
      const answeredNow = domQuestions.filter(q => state.answers[q.n] !== undefined).length;
      document.querySelector('.progress-meta span:last-child').textContent = `${totalAnswered()} / 288 respondidas (${Math.round((totalAnswered()/288)*100)}%)`;
      document.querySelector('.progress-fill').style.width = `${Math.round((totalAnswered()/288)*100)}%`;
      document.querySelector('.domain-head p').textContent = `${answeredNow} de 24 questões respondidas neste domínio.`;
      const nextBtn = document.getElementById('btn-next');
      nextBtn.disabled = answeredNow < 24;
    });
  });

  document.getElementById("btn-prev").onclick = () => {
    if (state.domainIndex === 0) { state.screen = "cadastro"; }
    else { state.domainIndex -= 1; }
    renderApp();
    window.scrollTo(0,0);
  };
  document.getElementById("btn-next").onclick = () => {
    const answeredNow = domQuestions.filter(q => state.answers[q.n] !== undefined).length;
    if (answeredNow < 24) {
      const firstMissing = domQuestions.find(q => state.answers[q.n] === undefined);
      if (firstMissing) {
        const row = root.querySelector(`.question-row[data-row="${firstMissing.n}"]`);
        if (row) { row.classList.add('unanswered'); row.scrollIntoView({behavior:'smooth', block:'center'}); }
      }
      return;
    }
    if (state.domainIndex === 11) {
      state.results = computeResults(state.answers);
      persistAssessment(state, state.results).then(() => {
        if (state.screen === "report" && !state.viewingSavedId) renderApp();
      });
      state.screen = "report";
    } else {
      state.domainIndex += 1;
    }
    renderApp();
    window.scrollTo(0,0);
  };
}

function toRoman(num){
  const romans = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
  return romans[num-1] || num;
}

  root.innerHTML = `

      <div style="text-align:center;">
        <div class="mark">SOH <span>Assessment</span>™</div>

      </div>
    </div>
    <div class="card" style="max-width:420px;margin:40px auto 0;">
      <h2 style="text-align:center;">Entrar</h2>
      <p class="muted small" style="text-align:center;">Acesso restrito a facilitadores certificados e à administração do Instituto Garcia Marques.</p>
      <div id="login-error" class="small" style="color:var(--rust);text-align:center;min-height:18px;margin-bottom:8px;"></div>
      <div class="field"><label>E-mail</label><input id="login-email" type="email" autocomplete="username"></div>
      <div class="field"><label>Senha</label><input id="login-password" type="password" autocomplete="current-password"></div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;">Entrar</button>
      </div>
      <p class="small muted" style="text-align:center;margin-top:18px;">Ainda não tem acesso? Fale com a administração do Instituto Garcia Marques para receber seu login.</p>
    </div>
  `;

  const doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    const btn = document.getElementById("btn-login");
    errEl.textContent = "";
    if (!email || !password) { errEl.textContent = "Preencha e-mail e senha."; return; }
    btn.disabled = true; btn.textContent = "Entrando...";
    try {
      const { session } = await authSignIn(email, password);
      const profile = await authGetProfile(session.user.id);
      if (!profile) throw new Error("Perfil não encontrado. Contate a administração.");
      if (profile.status !== "ativo") throw new Error("Este acesso está inativo. Contate a administração.");
      state.session = session;
      state.profile = profile;
      state.screen = profile.role === "admin" ? "admin-dashboard" : "facilitator-dashboard";
      renderApp();
    } catch (err) {
      console.error("[SOH] Falha no login:", err);
      errEl.textContent = err.message && err.message.includes("Invalid login")
        ? "E-mail ou senha incorretos."
        : (err.message || "Não foi possível entrar. Tente novamente.");
      btn.disabled = false; btn.textContent = "Entrar";
    }
  };

  document.getElementById("btn-login").onclick = doLogin;
  document.getElementById("login-password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
}

function attachAssessmentsListHandlers(getList){
  root.querySelectorAll(".btn-view-report").forEach(btn => {
    btn.onclick = () => viewSavedReport(btn.dataset.id);
  });
  const searchEl = document.getElementById("assessments-search");
  if (searchEl) searchEl.addEventListener("input", debounce(async () => {
    const list = await dbListAssessments({ search: searchEl.value });
    document.getElementById("assessments-tbody").innerHTML = list.length
      ? list.map(a => `
        <tr data-id="${a.id}" class="assessment-row">
          <td>${esc(a.participants?.nome || "—")}</td>
          <td>${formatDateTime(a.completed_at)}</td>
          <td>${Number(a.igsoh).toFixed(2)}</td>
          <td><span class="badge-class ${classify(Number(a.igsoh)).css}">${a.igsoh_classification}</span></td>
          <td>${esc(a.cpt_domain)}</td>
          <td>${esc(a.participants?.cidade || "—")}${a.participants?.estado ? "/"+esc(a.participants.estado) : ""}</td>
          <td><button class="btn-text btn-view-report" data-id="${a.id}">Ver relatório</button></td>
        </tr>`).join("")
      : `<tr><td colspan="7" class="muted">Nenhum resultado para essa busca.</td></tr>`;
    root.querySelectorAll(".btn-view-report").forEach(btn => { btn.onclick = () => viewSavedReport(btn.dataset.id); });
  }, 300));

  const csvBtn = document.getElementById("btn-export-csv");
  if (csvBtn) csvBtn.onclick = async () => exportAssessmentsCSV(await getList());
  const xlsxBtn = document.getElementById("btn-export-xlsx");
  if (xlsxBtn) xlsxBtn.onclick = async () => exportAssessmentsXLSX(await getList());
}

function debounce(fn, ms){
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function formatDateTime(iso){
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
}

async function renderLinksSection(facilitadorId){

    links = await dbListLinks();

    console.error("[SOH] Erro ao carregar links:", err);
    container.innerHTML = `<p style="color:var(--rust)" class="small">Não foi possível carregar os links.</p>`;
    return;
  }

  const baseUrl = window.location.origin + window.location.pathname;

  const rows = links.map(l => {
    const url = `${baseUrl}?link=${l.token}`;
    return `<tr data-link-id="${l.id}">
      <td>${esc(l.label || "Sem nome")}</td>
      <td>${l.use_count}${l.max_uses ? " / " + l.max_uses : ""}</td>

        <button class="btn-text btn-toggle-link" data-id="${l.id}" data-active="${l.active}">${l.active ? "Desativar" : "Reativar"}</button>
      </td>
    </tr>`;
  }).join("");

  container.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:14px;">
      <input id="new-link-label" placeholder="Nome do link (ex.: Turma Julho 2026)" style="flex:1;max-width:320px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit;">
      <button class="btn btn-primary" id="btn-create-link">+ Gerar link</button>
    </div>
    <div class="table-scroll"><table class="domain-table">
      <thead><tr><th>Nome</th><th>Usos</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4" class="muted">Nenhum link gerado ainda.</td></tr>`}</tbody>
    </table></div>
  `;

  document.getElementById("btn-create-link").onclick = async () => {
    const label = document.getElementById("new-link-label").value.trim();
    const btn = document.getElementById("btn-create-link");
    btn.disabled = true;
    try {
      await dbCreateLink(facilitadorId, label);
      await renderLinksSection(facilitadorId);
    } catch (err) {
      console.error("[SOH] Erro ao criar link:", err);
      alert("Não foi possível gerar o link. Detalhes no console.");
      btn.disabled = false;
    }
  };

  container.querySelectorAll(".btn-copy-link").forEach(btn => {
    btn.onclick = () => {
      navigator.clipboard.writeText(btn.dataset.url).then(() => {
        const original = btn.textContent;
        btn.textContent = "Copiado!";
        setTimeout(() => { btn.textContent = original; }, 1500);
      }).catch(() => alert("Link: " + btn.dataset.url));
    };
  });

    btn.onclick = async () => {

        await dbToggleLinkActive(btn.dataset.id, !isActive);

function hydratePatientFromDB(participant, assessment){
  return {
    nome: participant.nome,
    data: assessment.completed_at ? assessment.completed_at.slice(0, 10) : "",
    sexo: participant.sexo || "",
    idade: participant.idade || "",
    estadoCivil: participant.estado_civil || "",
    escolaridade: participant.escolaridade || "",
    profissao: participant.cargo || "",
    cidade: participant.cidade || "",
    estado: participant.estado || "",
    facilitador: participant.facilitador || "",
    programa: participant.programa || "",
    observacoes: participant.observacoes || ""
  };
}

function hydrateResultsFromDB(full){
  const { assessment, domainScores, subdomainScores, results, recommendations } = full;

  const byDomain = {};
  domainScores.forEach(d => { byDomain[d.domain_name] = d; });
  const domainScoreList = DOMAIN_ORDER.map(d => byDomain[d] ? Number(byDomain[d].score) : 0);
  const ranked = DOMAIN_ORDER
    .map(d => ({ domain: d, score: byDomain[d] ? Number(byDomain[d].score) : 0 }))
    .sort((a, b) => a.score - b.score);

  // Reconstrói domainDetail (score + subdomínios) a partir das linhas salvas em subdomain_scores,
  // necessário para a devolutiva completa (buildDomainDevolutiva / buildPriorityDeepDive).
  const domainDetail = {};
  DOMAIN_ORDER.forEach(domainName => {
    const subsForDomain = (subdomainScores || [])
      .filter(s => s.domain_name === domainName)
      .sort((a, b) => a.subdomain_order - b.subdomain_order)
      .map(s => ({ name: s.subdomain_name, score: Number(s.score) }));
    domainDetail[domainName] = {
      score: byDomain[domainName] ? Number(byDomain[domainName].score) : 0,
      subdomains: subsForDomain.length ? subsForDomain : DOMAIN_MAP[domainName].subs.map(s => ({ name: s.name, score: byDomain[domainName] ? Number(byDomain[domainName].score) : 0 }))
    };
  });

  const nivel2 = recommendations.filter(r => r.nivel === "2 - Complementar").map(r => ({ domain: r.domain_name }));
  const nivel3 = recommendations.find(r => r.nivel === "3 - Manutenção");

  return {
    IGSOH: Number(assessment.igsoh),
    ICS: Number(assessment.ics),
    ITP: Number(assessment.itp),
    IRE: Number(assessment.ire),
    IEI: Number(assessment.iei),
    domainScoreList,
    domainDetail,
    ranked,
    cpt: { domain: assessment.cpt_domain, score: Number(assessment.cpt_score) },
    nextPriority: nivel2,
    strongest: { domain: nivel3 ? nivel3.domain_name : ranked[ranked.length - 1].domain },
    pontosFortes: (results.pontos_fortes || []).map(p => ({ domain: p.domain, score: Number(p.score) })),
    pontosVulneraveis: (results.pontos_vulneraveis || []).map(p => ({ domain: p.domain, score: Number(p.score) })),
    pedi: recommendations.map(r => ({
      priority: r.prioridade,
      domain: r.domain_name,
      score: Number(r.score),
      classification: r.classification,
      protocol: r.protocolo,
      prazo: r.prazo
    }))
  };
}

/* ===================== EXPORTAÇÕES: CSV / EXCEL ===================== */
function assessmentsToRows(list){
  return list.map(a => ({
    Participante: a.participants?.nome || "",
    Email: a.participants?.email || "",
    Cidade: a.participants?.cidade || "",
    Estado: a.participants?.estado || "",
    Programa: a.participants?.programa || "",
    Data: formatDateTime(a.completed_at),
    "Tempo (s)": a.duration_seconds ?? "",
    IGSOH: a.igsoh,
    Classificacao: a.igsoh_classification,
    ICS: a.ics, ITP: a.itp, IRE: a.ire, IEI: a.iei,
    CPT: a.cpt_domain
  }));
}

function exportAssessmentsCSV(list){
  const rows = assessmentsToRows(list);
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(";")]
    .concat(rows.map(r => headers.map(h => `"${String(r[h] ?? "").replace(/"/g, '""')}"`).join(";")))
    .join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "SOH_Assessment_avaliacoes.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function exportAssessmentsXLSX(list){
  if (typeof XLSX === "undefined") {
    alert("A biblioteca de exportação Excel ainda está carregando. Aguarde alguns segundos e tente novamente.");
    return;
  }
  const rows = assessmentsToRows(list);
  if (!rows.length) return;
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Avaliações");
  XLSX.writeFile(wb, "SOH_Assessment_avaliacoes.xlsx");
}

/* ===================== RADAR CHART (SVG) ===================== */
function renderRadarSVG(domainScoreList){
  const size = 480, cx = size/2, cy = size/2, maxR = 150, minR = 20;
  const n = domainScoreList.length;
  const angleStep = (Math.PI*2)/n;
  const startAngle = -Math.PI/2;

  function pointFor(i, value){
    const r = minR + ((value-1)/4) * (maxR-minR);
    const a = startAngle + i*angleStep;
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  }

  // grid rings at 1,2,3,4,5
  let rings = "";
  [1,2,3,4,5].forEach(v => {
    const pts = DOMAIN_ORDER.map((d,i) => pointFor(i, v).join(",")).join(" ");
    rings += `<polygon points="${pts}" fill="none" stroke="var(--line, #DDD9CC)" stroke-width="${v===5?1.4:0.8}" />`;
  });

  // axes
  let axes = "";
  let labels = "";
  DOMAIN_ORDER.forEach((d,i) => {
    const [x,y] = pointFor(i, 5);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#DDD9CC" stroke-width="0.8"/>`;
    const [lx,ly] = pointFor(i, 5.85);
    const cosA = Math.cos(startAngle+i*angleStep);
    const anchor = Math.abs(cosA) < 0.15 ? "middle" : (cosA > 0 ? "start" : "end");
    labels += `<text x="${lx}" y="${ly}" font-size="11" fill="#5B655F" text-anchor="${anchor}" dominant-baseline="middle">${esc(shortLabel(d))}</text>`;
  });

  // data polygon
  const dataPts = domainScoreList.map((v,i) => pointFor(i, v).join(",")).join(" ");

  // dots
  let dots = "";
  domainScoreList.forEach((v,i) => {
    const [x,y] = pointFor(i,v);
    const cls = classify(v);
    dots += `<circle cx="${x}" cy="${y}" r="4" fill="${cls.color}" stroke="#fff" stroke-width="1.5"/>`;
  });

  return `<svg class="radar" viewBox="-130 -40 ${size+260} ${size+80}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:620px;display:block;margin:0 auto;">
    ${rings}
    ${axes}
    <polygon points="${dataPts}" fill="#33574B" fill-opacity="0.28" stroke="#203C33" stroke-width="2"/>
    ${dots}
    ${labels}
  </svg>`;
}

function shortLabel(d){
  const map = {
    "Programação Mental": "Progr. Mental",
    "Liberdade Deliberativa": "Liberd. Deliberativa",
    "Inteligência Emocional": "Intel. Emocional",
    "Comunicação e Relacionamentos": "Comunic. & Relac.",
    "Liderança e Influência": "Liderança & Influência",
    "Propósito e Realização": "Propósito & Realiz.",
    "Desenvolvimento Espiritual": "Desenv. Espiritual"
  };
  return map[d] || d;
}

function buildPriorityDeepDive(domainName, r, levelLabel, nome){
  const score = r.domainDetail[domainName].score;
  const band = classify(score);
  const tier = bandTier(band.label);
  const content = DOMAIN_CONTENT[domainName];
  const tierData = content.tiers[tier];
  const proto = PROTOCOLS[domainName];
  const acts = content.recomendacoes;

  return `
  <div class="card priority-deepdive-card">
    <span class="eyebrow">${esc(levelLabel)}</span>
    <h2>${esc(domainName)}™ <span class="small muted">(${score.toFixed(2)} &middot; ${band.label})</span></h2>

    <h4>Resumo executivo</h4>
    <p>${tierData.revela}</p>

    <h4>Possíveis impactos</h4>
    <p>${tierData.vida}</p>

    <h4>Como influencia os demais domínios</h4>

    <p>${tierData.vida} Esses comportamentos tendem a se repetir em diferentes contextos — familiar, profissional e social — até que o domínio seja intencionalmente fortalecido.</p>

    <ul class="list-plain compact-list">${content.beneficios.map(b => `<li>${esc(b)}</li>`).join("")}</ul>

    <h4>Plano de desenvolvimento</h4>

function testimonialAuthLabel(code){
  const map = {
    identificado: "Autoriza uso identificado (nome e cidade)",
    anonimo: "Autoriza apenas uso anônimo",
    nao_autorizado: "Não autoriza a utilização do depoimento"
  };
  return map[code] || '<span class="muted">Não informado.</span>';
}

function formatDate(iso){
  if (!iso) return "—";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

/* ===================== APP ROUTER ===================== */
function renderApp(){
  if (state.screen === "link-invalid") renderLinkInvalid();
  else if (state.screen === "login") renderLogin();
  else if (state.screen === "facilitator-dashboard") renderFacilitatorDashboard();
  else if (state.screen === "admin-dashboard") renderAdminDashboard();
  else if (state.screen === "admin-facilitators") renderFacilitatorsAdmin();
  else if (state.screen === "intro") renderIntro();
  else if (state.screen === "cadastro") renderCadastro();
  else if (state.screen === "domain") renderDomain();
  else if (state.screen === "report") renderReport();
  else if (state.screen === "feedback") renderFeedbackScreen();
  else if (state.screen === "feedback-thankyou") renderFeedbackThankYou();
  attachLogoutHandler();
}

async function bootstrapApp(){
  const params = new URLSearchParams(window.location.search);
  const linkToken = params.get("link");

  if (linkToken) {
    root.innerHTML = `<div class="card" style="max-width:480px;margin:60px auto;"><p class="muted">Carregando avaliação...</p></div>`;
    try {
      const info = await dbValidateLink(linkToken);
      if (!info.valid) {
        state.screen = "link-invalid";
        state.linkInvalidMessage = info.message;
        renderApp();
        return;
      }
      state.linkToken = linkToken;
      state.linkFacilitadorNome = info.facilitador_nome;
      state.screen = "intro";
      renderApp();
    } catch (err) {
      console.error("[SOH] Erro ao validar link:", err);
      state.screen = "link-invalid";
      state.linkInvalidMessage = "Não foi possível validar este link agora. Tente novamente em instantes.";
      renderApp();
    }
    return;
  }

  renderApp(); // mostra a tela de login imediatamente, sem espera
  const session = await authGetSession();
  if (session && session.user) {
    const profile = await authGetProfile(session.user.id);
    if (profile && profile.status === "ativo") {
      state.session = session;
      state.profile = profile;
      state.screen = profile.role === "admin" ? "admin-dashboard" : "facilitator-dashboard";
      renderApp();
    }
  }
}

function renderLinkInvalid(){
  root.innerHTML = `
    <div class="soh-brand no-print" style="justify-content:center;border-bottom:none;">
      <div style="text-align:center;">
        <div class="mark">SOH <span>Assessment</span>™</div>
        <div class="tag">Instituto Garcia Marques</div>
      </div>
    </div>
    <div class="card" style="max-width:440px;margin:40px auto 0;text-align:center;">
      <h2>Link indisponível</h2>
      <p class="muted">${esc(state.linkInvalidMessage || "Este link não está mais disponível.")}</p>
      <p class="small muted">Entre em contato com quem enviou este link para receber um novo.</p>
    </div>
  `;
}

bootstrapApp();
